name: Full E2E Regression

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
          - project: firefox
            browser: firefox
          - project: mobile-chrome
            browser: chromium
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npx playwright test tests/e2e tests/help-guidance.spec.ts --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-${{ matrix.project }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

  a11y:
    name: Accessibility (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:a11y
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-a11y
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
